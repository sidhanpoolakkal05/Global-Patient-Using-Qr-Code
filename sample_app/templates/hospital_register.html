<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Register</title>
</head>
<body>
    <h2>Hospital Register</h2>
    <form action="" method="post">
        {% csrf_token %}
        
        <label for="name">Hospital Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email :</label>
        <input type="email" name="email"required><br><br>
        <label for="phone">Contact Number:</label>
        <input type="text" id="phone" name="phone" required><br><br>
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" required><br>
        <input type="text" name="city" placeholder="City" required><br>
        <input type="text" name="state" placeholder="State" required><br>
        <input type="text" name="pincode" placeholder="Pincode" required><br>
        <input type="text" name="country" placeholder="Country" required><br><br>
        <label for="registration_number">Register No.</label>
        <input type="text" id="registration_number" name="registration_number" required><br><br>

        <label for="type">Hospital Type:</label>
        <select name="type" id="type" required>
            <option value="government">Government</option>
            <option value="private">Private</option>
            <option value="clinic">Clinic</option>
        </select><br><br>

        <label for="username">Username:</label>
        <input type="text" name="username" placeholder="Username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" name="password" required><br><br>
        <button type="submit">Register</button>
    </form>

</body>
</html>
