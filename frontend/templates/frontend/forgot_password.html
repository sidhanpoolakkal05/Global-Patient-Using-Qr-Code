{% extends "frontend/base.html" %}
{% load static %}
{% block title %}Reset Password – MediScan{% endblock %}

{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:var(--color-background);position:relative;">

  <div style="max-width:32rem;width:100%;border-radius:2rem;box-shadow:0 40px 80px rgba(0,0,0,0.12);background:rgba(255,255,255,0.8);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.6);padding:3.5rem;" class="animate-fade-in">
    <div style="text-align:center;margin-bottom:2.5rem;">
      <div style="width:4rem;height:4rem;background:#EFF6FF;border-radius:1.25rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;box-shadow:0 8px 24px rgba(37,99,235,0.15);">
        <i data-lucide="key-round" style="width:2rem;height:2rem;color:#2563EB;"></i>
      </div>
      <h2 style="font-size:2rem;font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-0.04em;color:#005440;font-family:'Manrope',sans-serif;">Reset Password</h2>
      <p style="font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.2em;color:#9CA3AF;margin-top:0.5rem;font-family:'Montserrat',sans-serif;">Enter details to verify identity</p>
    </div>

    <!-- Feedback messages -->
    <div class="alert alert-error"   id="reset-error"   style="margin-bottom:1.5rem;"></div>
    <div class="alert alert-success" id="reset-success" style="margin-bottom:1.5rem;display:none;"></div>

    <form id="forgot-form" onsubmit="handleForgotPassword(event)" style="display:flex;flex-direction:column;gap:1.25rem;">
      <input type="text"  name="username" placeholder="Username" required class="input-field" />
      <input type="email" name="email"    placeholder="Registered Email" required class="input-field" />
      <hr style="border:0;border-top:1px solid #F3F4F6;margin:0.5rem 0;" />
      <p style="font-size:0.6rem;font-weight:700;color:#9CA3AF;text-align:center;">ENTER YOUR NEW PASSWORD BELOW</p>
      <input type="password" name="new_password" placeholder="New Password" required class="input-field" />
      <button type="submit" id="reset-btn" class="btn-primary" style="margin-top:0.5rem;padding:1rem;">
        Reset My Password
      </button>
    </form>

    <div style="margin-top:2rem;text-align:center;">
       <a href="/login/" style="font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-primary);text-decoration:none;">Back to Login</a>
    </div>
  </div>
</div>

{% block extra_js %}
<script>
async function handleForgotPassword(e) {
  e.preventDefault();
  const form = e.target;
  const btn  = document.getElementById('reset-btn');
  const err  = document.getElementById('reset-error');
  const suc  = document.getElementById('reset-success');
  
  err.classList.remove('show'); suc.style.display = 'none';
  btn.textContent = 'Updating...'; btn.disabled = true;

  try {
    const res = await Auth.post('/api/auth/reset-password/', {
      username: form.username.value,
      email: form.email.value,
      new_password: form.new_password.value
    });
    
    suc.textContent = 'Password has been reset successfully! You can now log in.';
    suc.style.display = 'block';
    suc.classList.add('show');
    form.style.display = 'none';
    showToast('Password updated successfully');
  } catch(e) {
    err.textContent = typeof e === 'string' ? e : (e.error || 'Identity verification failed. Please check your username and email.');
    err.classList.add('show');
    showToast('Reset failed', 'error');
  } finally {
    btn.textContent = 'Reset My Password';
    btn.disabled = false;
  }
}
</script>
{% endblock %}
{% endblock %}
